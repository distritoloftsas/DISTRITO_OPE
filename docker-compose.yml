services:
  postgres:
    image: postgres:16-alpine
    container_name: distrito-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: distrito_loft
      POSTGRES_USER: distrito
      POSTGRES_PASSWORD: distrito_local_dev
    ports:
      - "5432:5432"
    volumes:
      - distrito_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U distrito -d distrito_loft"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  distrito_pgdata:
