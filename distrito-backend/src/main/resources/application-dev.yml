# Perfil DEV: desarrollo local. Apunta al Postgres del docker-compose.
# DB_URL tiene prioridad: si se setea (por ej en Railway por error), gana.
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:distrito_loft}}
    username: ${DB_USER:distrito}
    password: ${DB_PASSWORD:distrito_local_dev}
    driver-class-name: org.postgresql.Driver

  jpa:
    properties:
      hibernate:
        format_sql: true

distrito:
  jwt:
    secret: ${JWT_SECRET:cambiar-este-secreto-en-produccion-debe-ser-largo-y-aleatorio}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}

logging:
  level:
    com.distritoloft: DEBUG
    org.springframework.security: INFO
