spring:
  application:
    name: distrito-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:distrito_loft}
    username: ${DB_USER:distrito}
    password: ${DB_PASSWORD:distrito_local_dev}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate   # Flyway gestiona el schema, JPA solo valida
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized

distrito:
  jwt:
    secret: ${JWT_SECRET:cambiar-este-secreto-en-produccion-debe-ser-largo-y-aleatorio}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

logging:
  level:
    com.distritoloft: DEBUG
    org.springframework.security: INFO
