# Perfil PROD: producción. TODAS las credenciales se inyectan por variables de entorno.
# No commitear secretos a este archivo.
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}

distrito:
  jwt:
    # Fallback SOLO para que arranque y poder diagnosticar. En prod real
    # JWT_SECRET DEBE estar en env vars - si esto se activa, los tokens
    # firmados se invalidan a cada redeploy.
    secret: ${JWT_SECRET:fallback-temporal-cambiar-asap-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}

management:
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: WARN
    com.distritoloft: INFO
