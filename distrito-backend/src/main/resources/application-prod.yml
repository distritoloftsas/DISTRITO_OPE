# Perfil PROD: produccion. Las credenciales de DB se leen via env vars
# usando los nombres canonicos de Spring Boot (relaxed binding):
#   SPRING_DATASOURCE_URL      -> spring.datasource.url
#   SPRING_DATASOURCE_USERNAME -> spring.datasource.username
#   SPRING_DATASOURCE_PASSWORD -> spring.datasource.password
#
# No usamos ${PLACEHOLDER} aqui porque Spring resolvio el literal
# "${DB_URL}" sin sustituir en un deploy previo en Railway (causa
# desconocida, probable conflicto con la inicializacion temprana de
# Hikari). El binding automatico evita el problema.
spring:
  datasource:
    # TEMPORAL: hardcoded para que el deploy arranque. Las env vars de
    # Railway estan presentes pero no llegan al proceso por alguna razon.
    # Apenas la app este UP, rotar el password de Neon y mover esto a
    # variables. La URL aqui es la misma que Railway tiene.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://ep-falling-butterfly-aj1xkj3g.c-3.us-east-2.aws.neon.tech/neondb?sslmode=require&channel_binding=require}
    username: ${SPRING_DATASOURCE_USERNAME:neondb_owner}
    password: ${SPRING_DATASOURCE_PASSWORD:npg_jmOxV3JLTc8K}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10

distrito:
  jwt:
    # Fallback SOLO para que arranque y poder diagnosticar. En prod real
    # JWT_SECRET DEBE estar en env vars - si esto se activa, los tokens
    # firmados se invalidan a cada redeploy.
    secret: ${JWT_SECRET:fallback-temporal-cambiar-asap-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa}
  cors:
    # Si el env var llega, gana. Si no, default a la URL de prod.
    allowed-origins: ${CORS_ORIGINS:https://app.distritoloft.com}

management:
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: WARN
    com.distritoloft: INFO
