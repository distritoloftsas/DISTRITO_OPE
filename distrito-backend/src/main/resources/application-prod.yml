# Perfil PROD: producción. TODAS las credenciales se inyectan por variables de entorno.
# No commitear secretos a este archivo.
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}

distrito:
  jwt:
    secret: ${JWT_SECRET}
  cors:
    allowed-origins: ${CORS_ORIGINS}

management:
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: WARN
    com.distritoloft: INFO
